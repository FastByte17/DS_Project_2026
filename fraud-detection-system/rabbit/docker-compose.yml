
services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_1
    hostname: rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: myuser
      RABBITMQ_DEFAULT_PASS: mypassword
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  fraud_detector_consumer:
    build:
      context: ..
      dockerfile: rabbit/Dockerfile.fraud_detector
    container_name: fraud_detector_consumer_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: myuser
      RABBITMQ_PASSWORD: mypassword
      CDR_INPUT_QUEUE: CDR
      FRAUD_QUEUE: FRAUD_CDR
      NORMAL_QUEUE: NORMAL_CDR
      OLLAMA_HOST: http://ollama:11434
    command: ["python", "-u", "fraud_detector_consumer.py"]
    restart: unless-stopped
