
services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_1
    hostname: rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: myuser
      RABBITMQ_DEFAULT_PASS: mypassword
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  python_publisher_1:
    build:
      context: .
      dockerfile: Dockerfile.publisher
      args: 
        - testarg=test
    container_name: python_publisher_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_DEFAULT_USER: myuser
      RABBITMQ_DEFAULT_PASS: mypassword
    command: ["fastapi", "run", "main.py", "--port" ,"8081"]

  python_consumer_1:
    build:
      context: .
      dockerfile: Dockerfile.consumer
      # args: 
      #   - 
    container_name: python_consumer_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_DEFAULT_USER: myuser
      RABBITMQ_DEFAULT_PASS: mypassword
    command: ["python", "-u", "main.py"]
