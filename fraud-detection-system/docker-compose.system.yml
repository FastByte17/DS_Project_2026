  #       condition: service_healthy
  #   environment:
  #     RABBITMQ_HOST: rabbitmq
  #     RABBITMQ_DEFAULT_USER: myuser
  #     RABBITMQ_DEFAULT_PASS: mypassword
  #   command: ["python", "-u", "main.py"]
  #   networks:
  #     - fraud-detection-network

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  ollama-data:
  postgres_data:
    driver: local

networks:
  monitoring:
    driver: bridge
  fraud-detection-network: