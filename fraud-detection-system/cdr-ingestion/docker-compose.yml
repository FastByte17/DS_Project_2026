services:
  cdr-ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cdr_ingestion_1
    hostname: cdr-ingestion
    ports:
      - "8080:8080"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: myuser
      RABBITMQ_PASSWORD: mypassword
      RABBITMQ_QUEUE: CDR
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: SecureDBPassword456!
      POSTGRES_DB: cdr_database
      SERVICE_NAME: CDR-Ingestion-Service
      SERVICE_VERSION: 1.0.0
      DEBUG: "False"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - fraud-detection-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./logs:/app/logs

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_1
    hostname: rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: myuser
      RABBITMQ_DEFAULT_PASS: mypassword
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud-detection-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: postgres_1
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: SecureDBPassword456!
      POSTGRES_DB: cdr_database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud-detection-network
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

networks:
  fraud-detection-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
